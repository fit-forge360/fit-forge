# ──────────────────────────────────────────────────────────────────────────────
# ai-agent-service Kubernetes manifests
# Includes: Secret, Deployment, ClusterIP Service
# ──────────────────────────────────────────────────────────────────────────────

# ── Secret — Google AI API key ────────────────────────────────────────────────
# Create with:
#   kubectl create secret generic ai-agent-secret \
#     --from-literal=GOOGLE_API_KEY='AIza...' \
#     -n fitforge-dev
# OR base64-encode and paste below:
#   echo -n 'AIza...' | base64
apiVersion: v1
kind: Secret
metadata:
  name: ai-agent-secret
  namespace: fitforge-dev
type: Opaque
data:
  # Replace with: echo -n 'YOUR_REAL_KEY' | base64
  GOOGLE_API_KEY: cmVwbGFjZV93aXRoX3JlYWxfa2V5

---
# ── Deployment ─────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-agent-service
  namespace: fitforge-dev
  labels:
    app: ai-agent-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-agent-service
  template:
    metadata:
      labels:
        app: ai-agent-service
    spec:
      containers:
        - name: ai-agent-service
          # Replace tag with your built image, e.g.:
          # docker build -t youruser/fitforge-ai-agent:v1 ./services/ai-agent-service
          image: youruser/fitforge-ai-agent:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5006
          env:
            - name: PORT
              value: "5006"
            # auth-service ClusterIP DNS (same namespace)
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:5001"
            # LLM model — override here if desired
            - name: LLM_MODEL
              value: "gemini-2.5-flash-lite"
            # API key from Secret
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-agent-secret
                  key: GOOGLE_API_KEY
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5006
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 5006
            initialDelaySeconds: 10
            periodSeconds: 10

---
# ── ClusterIP Service ──────────────────────────────────────────────────────────
# Reachable inside the cluster as: http://ai-agent-service:5006
apiVersion: v1
kind: Service
metadata:
  name: ai-agent-service
  namespace: fitforge-dev
  labels:
    app: ai-agent-service
spec:
  selector:
    app: ai-agent-service
  ports:
    - port: 5006
      targetPort: 5006
      protocol: TCP
  type: ClusterIP
