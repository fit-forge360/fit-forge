# =============================================================================
# Base Secret: mongodb-secret  (DO NOT COMMIT TO GIT!)
# =============================================================================
# This file is the INPUT for kubeseal. It contains plaintext credentials.
# After running kubeseal to produce the SealedSecret, DELETE this file.
#
# Keys required by the Bitnami MongoDB Helm chart when using auth.existingSecret:
#   - mongodb-root-password      → password for the "root" admin user
#   - mongodb-passwords          → comma-separated passwords for auth.usernames
#   - mongodb-metrics-password   → password for the metrics exporter user
#   - mongodb-replica-set-key    → shared keyFile contents for replica set auth
#
# Generate strong random values before applying:
#   openssl rand -base64 24   (for passwords)
#   openssl rand -base64 756  (for replica-set-key, matches MongoDB keyFile spec)
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
  namespace: fit-forge
  labels:
    app.kubernetes.io/part-of: fitforge
    app.kubernetes.io/component: database
type: Opaque
stringData:
  # ── Root administrator password ──────────────────────────────────────────────
  # Used by: Bitnami chart to initialize the admin user
  mongodb-root-password: "/16+FELHRzSC44dyqpUdkpgdDctTSd0h"

  # ── Application user password(s) ────────────────────────────────────────────
  # Maps 1:1 to auth.usernames in mongodb-values.yaml
  # If multiple users: comma-separated (e.g., "pass1,pass2")
  mongodb-passwords: "WLnwnCi4bLCXxJncDMJVkr1QwW/ccwLL,utMYP6wGPZ2ORVx5VTkf1IG+IFWSSalZ,9DRax5fzeA0SJYcz/dEOQk8bAsRyBkjh,YZ2Hsqr8I0Kscxo0Y4pR1XZX7e437zSl,P6W/ORh2M4h7oyZG5simAKGh+1C771nU"

  # ── Metrics exporter password ────────────────────────────────────────────────
  # Used by the MongoDB exporter sidecar to authenticate and scrape metrics
  mongodb-metrics-password: "xLNbERVWMBMsrteb/ojJpOHdEXokcl3f"

  # ── Replica set keyFile ──────────────────────────────────────────────────────
  # Internal authentication key shared across all replica set members.
  # Generate with: openssl rand -base64 756
  mongodb-replica-set-key: ""
