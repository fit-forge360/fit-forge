# mongo-service.yaml
# Headless Service (clusterIP: None)
#   - Required by StatefulSet for stable pod DNS
#   - Pods reachable as:
#       mongo-0.mongo-service.default.svc.cluster.local:27017
#       mongo-1.mongo-service.default.svc.cluster.local:27017
#       mongo-2.mongo-service.default.svc.cluster.local:27017
#   - Short form within the same namespace: mongo-0.mongo-service:27017
#
# Microservices should connect using the full replica set connection string:
#   mongodb://user:pass@mongo-0.mongo-service:27017,mongo-1.mongo-service:27017,mongo-2.mongo-service:27017/db?replicaSet=rs0
apiVersion: v1
kind: Service
metadata:
  name: mongo-service
  namespace: default
  labels:
    app: mongo
spec:
  clusterIP: None       # Headless — required by StatefulSet for stable pod DNS
  publishNotReadyAddresses: true   # Allow DNS for pods before they pass readiness
  selector:
    app: mongo
  ports:
    - port: 27017
      targetPort: 27017
