name: CI — Frontend

on:
  push:
    branches: 
      # - develop
      # - main
      - feature/ci-frontend
    paths:
      - "frontend/**"
      - ".github/workflows/ci-frontend.yml"
      - ".github/workflows/_ci-template.yml"
  pull_request:
    branches:
      # - develop
      # - main
      - feature/ci-frontend
    paths:
      - "frontend/**"
      - ".github/workflows/ci-frontend.yml"
      - ".github/workflows/_ci-template.yml"

jobs:
  ci:
    uses: ./.github/workflows/_ci-template.yml
    with:
      service-name: workout-service
      service-path: services/workout-service
      runtime: node
      node-version: "20"
      environment: ${{ github.ref_name }}
    secrets: inherit
  ## Check it 