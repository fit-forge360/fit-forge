name: CI — Frontend

on:
  push:
    branches: 
      - develop
      - main
      # - feature/ci-frontend
    paths:
      - "frontend/**"
      - ".github/workflows/ci-frontend.yml"
      - ".github/workflows/_ci-template.yml"
  pull_request:
    branches:
      - develop
      - main
      # - feature/ci-frontend
    paths:
      - "frontend/**"
      - ".github/workflows/ci-frontend.yml"
      - ".github/workflows/_ci-template.yml"

# give the workflow permission to write to the repository contents
permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/_ci-template.yml
    with:
      service-name: frontend
      service-path: frontend
      runtime: node
      node-version: "20"
      environment: ${{ github.ref_name }}
    secrets: inherit
