server {
  listen 3000;
  root /usr/share/nginx/html;
  index index.html;

  # ── Per-service API routing (Docker / K8s internal DNS) ──────────────
  location /api/auth/      { proxy_pass http://auth-service:5001/auth/;           }
  location /api/users/     { proxy_pass http://user-service:5002/users/;          }
  location /api/workout/   { proxy_pass http://workout-service:5003/workout/;     }
  location /api/nutrition/ { proxy_pass http://nutrition-service:5004/nutrition/; }
  location /api/progress/  { proxy_pass http://progress-service:5005/progress/;   }
  location /api/ai/        { proxy_pass http://ai-agent-service:5006/;            }

  # ── SPA fallback ──────────────────────────────────────────────────────
  location / { try_files $uri /index.html; }
}
