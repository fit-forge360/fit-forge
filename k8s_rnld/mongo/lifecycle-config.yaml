apiVersion: v1
kind: ConfigMap
metadata:
  name: mongo-lifecycle-script-config
data:
  postStart.sh: |
    #!/bin/bash

    # Only run on the first pod
    if [[ "$(hostname)" != "mongo-0" ]]; then
      exit 0
    fi

    # Wait until mongod is accepting connections
    until mongosh --quiet --eval "db.adminCommand('ping').ok" \
          --username "$MONGO_INITDB_ROOT_USERNAME" \
          --password "$MONGO_INITDB_ROOT_PASSWORD" \
          --authenticationDatabase admin 2>/dev/null | grep -q 1; do
      echo "Waiting for mongod to be ready..."
      sleep 2
    done

    # Initiate replica set only if not already done
    mongosh --username "$MONGO_INITDB_ROOT_USERNAME" \
            --password "$MONGO_INITDB_ROOT_PASSWORD" \
            --authenticationDatabase admin \
            --eval '
              var status = rs.status();
              if (status.ok === 0 && status.code === 94) {
                rs.initiate({
                  _id: "rs0",
                  members: [
                    { _id: 0, host: "mongo-0.mongo-service.default.svc.cluster.local:27017" },
                    { _id: 1, host: "mongo-1.mongo-service.default.svc.cluster.local:27017" },
                    { _id: 2, host: "mongo-2.mongo-service.default.svc.cluster.local:27017" }
                  ]
                });
                print("Replica set initiated.");
              } else {
                print("Replica set already initialized. Skipping.");
              }
            '