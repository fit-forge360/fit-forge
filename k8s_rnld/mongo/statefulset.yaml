apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo-sts
  # namespace: default
spec:
  # Match the headless-service
  serviceName: mongo-service
  # Need atleast 3 replicas for lifecycle script 
  replicas: 3
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      name: mongo
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: mongo:7.0
          command:
            - mongod
            - "--replSet"
            - "rs0"
            - "--bind_ip_all"
          ports:
            - containerPort: 27017
          envFrom:
            - secretRef:
                name: mongo-root-secret
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - /scripts/postStart.sh
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "900m"
              memory: "1Gi"
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
            - name: mongo-init
              mountPath: /docker-entrypoint-initdb.d
            - name: mongo-lifecycle-script
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: mongo-init
          configMap:
            name: mongo-init-script-config
        - name: mongo-lifecycle-script
          configMap:
            name: mongo-lifecycle-script-config
            defaultMode: 0755   # executable permission
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests: 
            storage: "3Gi"
          limits:
            storage: "3Gi"
        storageClassName: nfs
    


        